<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Joyeux anniversaires MR</title>
  <meta name="description" content="Joyeux anniversaire à vous, beaucoup de 05 avril dans votre vie">
  <meta name="image" content="./hbd.webp">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Lato:wght@300;400&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html,body { width:100%; height:100%; background:#04040D; overflow:hidden; color:#fff; }

    #bg        { position:fixed; inset:0; width:100%; height:100%; pointer-events:none; z-index:0; }
    #fireworks { position:fixed; inset:0; width:100%; height:100%; pointer-events:none; z-index:1; }
    #vignette  { position:fixed; inset:0; pointer-events:none; z-index:2;
                 background:radial-gradient(ellipse at 50% 50%, transparent 35%, rgba(2,2,10,0.7) 100%); }
    #prog      { position:fixed; bottom:0; left:0; height:2px; background:rgba(245,200,66,.6); z-index:20; width:0; transition:width .9s ease; }

    /* NAVIGATION BUTTONS */
    .nav-controls { position:fixed; bottom:2rem; left:50%; transform:translateX(-50%); display:flex; gap:2rem; z-index:30; opacity:0; pointer-events:none; transition:opacity .5s ease; }
    .nav-controls.visible { opacity:1; pointer-events:auto; }
    .nav-btn { width:3.2rem; height:3.2rem; border-radius:50%; border:1px solid rgba(245,200,66,.4); background:rgba(245,200,66,.1); cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .3s ease; }
    .nav-btn:hover { background:rgba(245,200,66,.2); border-color:rgba(245,200,66,.6); transform:scale(1.1); }
    .nav-btn:active { transform:scale(0.95); }
    .nav-btn svg { width:1.4rem; height:1.4rem; stroke:#F5C842; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }

    /* ── START SCREEN ── */
    #start {
      position:fixed; inset:0; z-index:50;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      background:#04040D; cursor:pointer; transition:opacity 1.2s ease;
      user-select:none;
    }
    #start.hide { opacity:0; pointer-events:none; }
    .s-star { font-size:2.4rem; margin-bottom:1.8rem; animation:starPulse 2.4s ease-in-out infinite; color:#F5C842; }
    @keyframes starPulse { 0%,100%{transform:scale(1) rotate(0deg);opacity:.6} 50%{transform:scale(1.15) rotate(20deg);opacity:1} }
    .s-title { font-family:'Playfair Display',serif; font-style:italic; font-size:clamp(1.2rem,3.5vw,2rem); color:rgba(255,255,255,.5); margin-bottom:2.5rem; letter-spacing:.03em; }
    .s-btn   { font-family:'Lato',sans-serif; font-weight:300; font-size:.7rem; letter-spacing:.28em; text-transform:uppercase; color:rgba(245,200,66,.75); border:1px solid rgba(245,200,66,.3); padding:.85rem 2.4rem; border-radius:100px; animation:starPulse 2.4s ease-in-out infinite; }
    .s-note  { position:absolute; bottom:2.2rem; font-size:.62rem; letter-spacing:.15em; text-transform:uppercase; color:rgba(255,255,255,.18); }

    /* ── SCENES ── */
    .scene { position:fixed; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:3rem 2rem; opacity:0; transition:opacity 1.1s ease; z-index:5; pointer-events:none; }
    .scene.on { opacity:1; }

    /* INTRO */
    #s-intro p { font-family:'Lato',sans-serif; font-weight:300; font-size:clamp(.82rem,2vw,1.05rem); letter-spacing:.22em; text-transform:uppercase; color:rgba(255,255,255,.4); }
    #s-intro p::after { content:'|'; animation:blink .8s step-end infinite; color:rgba(245,200,66,.6); }
    @keyframes blink { 50%{opacity:0;} }

    /* PERSON */
    .pname { font-family:'Playfair Display',serif; font-style:italic; font-size:clamp(2rem,6vw,4rem); color:#F5C842; opacity:0; transform:translateY(16px); transition:opacity .75s ease,transform .75s ease; }
    .prole { font-size:.68rem; letter-spacing:.22em; text-transform:uppercase; color:rgba(255,255,255,.26); margin-top:.4em; opacity:0; transition:opacity .7s .45s ease; }
    .pline { width:0; height:1px; background:rgba(245,200,66,.25); margin:1.6em auto; transition:width 1s .8s ease; }
    .pmsg  { font-family:'Lato',sans-serif; font-weight:300; font-size:clamp(0.75rem,1.6vw,1rem); color:rgba(255,255,255,.88); max-width:700px; line-height:1.45; font-style:italic; opacity:0; transform:translateY(10px); transition:opacity .9s 1.25s ease,transform .9s 1.25s ease; white-space:pre-line; }
    .pmsg.short { font-size:clamp(1.1rem,2.8vw,1.5rem); line-height:1.6; }

    .scene.go .pname { opacity:1; transform:translateY(0); }
    .scene.go .prole { opacity:1; }
    .scene.go .pline { width:clamp(50px,9vw,90px); }
    .scene.go .pmsg  { opacity:1; transform:translateY(0); }

    /* REUNION */
    .rtitle { font-family:'Lato',sans-serif; font-weight:300; font-size:.66rem; letter-spacing:.28em; text-transform:uppercase; color:rgba(255,255,255,.22); margin-bottom:3rem; }
    .rgrid  { display:flex; flex-wrap:wrap; gap:1.2rem 2.4rem; justify-content:center; max-width:720px; margin-bottom:2.4rem; }
    .rname  { font-family:'Playfair Display',serif; font-style:italic; font-size:clamp(1.3rem,3.5vw,2.2rem); color:#F5C842; opacity:0; transform:scale(.8) translateY(10px); transition:opacity .6s ease,transform .6s ease; }
    .rname.lit { opacity:1; transform:scale(1) translateY(0); }
    .rsub   { font-family:'Lato',sans-serif; font-weight:300; font-size:clamp(.85rem,2vw,1.05rem); color:rgba(255,255,255,.32); letter-spacing:.08em; opacity:0; transition:opacity 1s ease; }
    .rsub.lit { opacity:1; }

    /* FINAL */
    .fname    { font-family:'Playfair Display',serif; font-weight:700; font-size:clamp(2.5rem,10vw,8rem); color:#F5C842; line-height:1.08; letter-spacing:.01em; opacity:0; transform:scale(.85); transition:opacity 1.1s ease,transform 1.1s ease; }
    .fwish    { font-family:'Playfair Display',serif; font-style:italic; font-size:clamp(1.3rem,4vw,2.6rem); color:rgba(255,255,255,.8); margin-top:.3em; opacity:0; transition:opacity 1s .7s ease; }
    .fdivider { width:0; height:1px; background:rgba(245,200,66,.28); margin:1.7em auto; transition:width 1s 1.35s ease; }
    .fmsg     { font-family:'Lato',sans-serif; font-weight:300; font-size:clamp(.88rem,2vw,1.15rem); color:rgba(255,255,255,.38); max-width:450px; line-height:2; white-space:pre-line; opacity:0; transition:opacity 1s 2s ease; }

    .scene.go .fname    { opacity:1; transform:scale(1); }
    .scene.go .fwish    { opacity:1; }
    .scene.go .fdivider { width:clamp(50px,10vw,100px); }
    .scene.go .fmsg     { opacity:1; }

    /* DANSEURS */
    .dancers { position:absolute; bottom:2rem; left:50%; transform:translateX(-50%); display:flex; gap:1.5rem; opacity:0; transition:opacity 1s 2.5s ease; }
    .scene.go .dancers { opacity:1; }
    .dancer { font-size:2.2rem; animation:dance 1.2s ease-in-out infinite; }
    .dancer:nth-child(2) { animation-delay:.15s; }
    .dancer:nth-child(3) { animation-delay:.3s; }
    .dancer:nth-child(4) { animation-delay:.45s; }
    .dancer:nth-child(5) { animation-delay:.6s; }
    @keyframes dance {
      0%,100% { transform:translateY(0) scale(1) rotate(0deg); }
      25% { transform:translateY(-15px) scale(1.1) rotate(-10deg); }
      50% { transform:translateY(0) scale(1) rotate(0deg); }
      75% { transform:translateY(-10px) scale(1.05) rotate(10deg); }
    }

    #burst { position:fixed; inset:0; width:100%; height:100%; pointer-events:none; z-index:6; }
  </style>
</head>
<body>

<canvas id="bg"></canvas>
<canvas id="fireworks"></canvas>
<div id="vignette"></div>
<div id="prog"></div>

<!-- START SCREEN -->
<div id="start" onclick="begin()">
  <div class="s-star">✦</div>
  <p class="s-title">Un message vous attend</p>
  <div class="s-btn">Appuyer pour commencer</div>
</div>

<!-- INTRO -->
<div class="scene" id="s-intro"><p id="intro-txt"></p></div>

<!-- REUNION -->
<div class="scene" id="s-reunion">
  <p class="rtitle">Réunis pour vous ce soir</p>
  <div class="rgrid" id="rgrid"></div>
  <p class="rsub" id="rsub"></p>
</div>

<!-- FINAL -->
<div class="scene" id="s-final">
  <div class="fname" id="f-name"></div>
  <div class="fwish">Joyeux Anniversaire</div>
  <div class="fdivider"></div>
  <p class="fmsg" id="f-msg"></p>
  <div class="dancers">
    <div class="dancer">🕺</div>
    <div class="dancer">💃</div>
    <div class="dancer">🎉</div>
    <div class="dancer">💃</div>
    <div class="dancer">🕺</div>
  </div>
</div>

<canvas id="burst"></canvas>

<!-- NAVIGATION CONTROLS -->
<div class="nav-controls" id="nav-controls">
  <button class="nav-btn" id="btn-prev" onclick="prevScene()">
    <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
  </button>
  <button class="nav-btn" id="btn-play" onclick="togglePause()">
    <svg viewBox="0 0 24 24" id="icon-pause"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
    <svg viewBox="0 0 24 24" id="icon-play" style="display:none"><path d="M8 5v14l11-7z"/></svg>
  </button>
  <button class="nav-btn" id="btn-next" onclick="nextScene()">
    <svg viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>
  </button>
</div>

<!-- YOUTUBE AUDIO (hidden) -->
<div id="yt-wrap" style="position:fixed;width:1px;height:1px;bottom:0;left:0;opacity:0;pointer-events:none;z-index:-1;">
  <!-- L'iframe sera injectée ici après le clic -->
</div>

<script>
/* ================================================================
   ✏️  CONFIGUREZ CES VALEURS AVANT D'ENVOYER LE LIEN
   ================================================================ */
const CFG = {
  bossName: "Golden Studio",

  team: [
    { name: "Henoc",   role: "Dev",    message: "Lorem ipsum dolor sit amet consectetur adipisicing elit. Quisquam, quod." },
    { name: "Kibalo",  role: "Design",        message: "Lorem ipsum dolor sit amet consectetur adipisicing elit. Quisquam, quod." },
    { name: "Grace",     role: "Com", message: "Happy Birthday 🎉 \n\nDu peu que je connais de vous, vous êtes un homme de valeurs, d’honneur et de travail, qui ne cesse de se dépasser.\nC’est inspirant de voir avec quelle rigueur et quelle passion vous faites les choses.\nVous êtes l’illustration même de Proverbes 22:29 (et ce n'est que le début).\nQue Dieu continue de bénir abondamment le travail de vos mains, d’élargir vos horizons et de faire prospérer chacune de vos initiatives.\nJoyeux anniversaire, M. Esso AWESSO." },
    { name: "Maurice",   role: "Com",     message: "Lorem ipsum dolor sit amet consectetur adipisicing elit. Quisquam, quod." },
  ],

  reunionPhrase: "Nous voulions vous le dire ensemble.",

  finalMessage: "Lorem ipsum dolor sit amet consectetur adipisicing elit. Quisquam, quod.",

  youtubeId: "l04BpnlteSY",
};
/* ================================================================ */


/* ════════════════════════════════════════
   ÉTOILES (background stars)
════════════════════════════════════════ */
const bgC = document.getElementById('bg');
const bgX = bgC.getContext('2d');
function rzBg(){ bgC.width=innerWidth; bgC.height=innerHeight; }
addEventListener('resize', rzBg); rzBg();

// 220 stars — 40 big bright ones, 180 small
const STARS = Array.from({length:220}, (_,i)=>{
  const big = i < 40;
  return {
    x: Math.random()*innerWidth, y: Math.random()*innerHeight,
    r: big ? 1.8+Math.random()*2.5 : 0.35+Math.random()*.9,
    baseA: big ? 0.55+Math.random()*.4 : 0.18+Math.random()*.45,
    vx:(Math.random()-.5)*.06, vy:-.03-Math.random()*.07,
    ph:Math.random()*Math.PI*2, ps:.003+Math.random()*.012,
    big,
  };
});

(function loopBg(){
  bgX.clearRect(0,0,bgC.width,bgC.height);
  STARS.forEach(s=>{
    s.x+=s.vx; s.y+=s.vy; s.ph+=s.ps;
    if(s.y<-4) s.y=bgC.height+4;
    if(s.x<-4) s.x=bgC.width+4;
    if(s.x>bgC.width+4) s.x=-4;
    const a = s.baseA*(0.25+0.75*Math.abs(Math.sin(s.ph)));
    if(s.big){
      // Cross / 4-point star shape
      bgX.save(); bgX.translate(s.x,s.y); bgX.fillStyle=`rgba(255,248,215,${a})`;
      bgX.beginPath();
      for(let k=0;k<4;k++){
        const ag=k*Math.PI/2;
        bgX.lineTo(Math.cos(ag)*s.r, Math.sin(ag)*s.r);
        bgX.lineTo(Math.cos(ag+Math.PI/4)*s.r*.32, Math.sin(ag+Math.PI/4)*s.r*.32);
      }
      bgX.closePath(); bgX.fill(); bgX.restore();
    } else {
      bgX.beginPath(); bgX.arc(s.x,s.y,s.r,0,6.28);
      bgX.fillStyle=`rgba(240,230,200,${a})`; bgX.fill();
    }
  });
  requestAnimationFrame(loopBg);
})();


/* ════════════════════════════════════════
   FEUX D'ARTIFICE
════════════════════════════════════════ */
const fwC = document.getElementById('fireworks');
const fwX = fwC.getContext('2d');
function rzFw(){ fwC.width=innerWidth; fwC.height=innerHeight; }
addEventListener('resize', rzFw); rzFw();

const FW_COLS = ['#F5C842','#FF8FAB','#7EC8E3','#ffffff','#B5E48C','#D4A6FF','#FF7878','#FFD700','#80FFDB'];
let rockets=[], fwParts=[], fwTimer=null;

function launchRocket(){
  rockets.push({
    x: innerWidth*(.15+Math.random()*.7), y: innerHeight+6,
    vy: -(11+Math.random()*7), vx: (Math.random()-.5)*1.8,
    targetY: innerHeight*(.08+Math.random()*.42),
    color: FW_COLS[0|Math.random()*FW_COLS.length],
    trail:[],
  });
}

function explodeFw(x,y,color){
  const n = 80+Math.floor(Math.random()*55);
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, spd=.8+Math.random()*5.8;
    fwParts.push({x,y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd-.6,
      alpha:1,r:.7+Math.random()*2.2,color,
      decay:.007+Math.random()*.013});
  }
}

(function loopFw(){
  fwX.clearRect(0,0,fwC.width,fwC.height);
  rockets = rockets.filter(r=>{
    r.trail.unshift({x:r.x,y:r.y});
    if(r.trail.length>14) r.trail.pop();
    r.x+=r.vx; r.y+=r.vy; r.vy*=.985;
    r.trail.forEach((t,i)=>{
      fwX.save(); fwX.globalAlpha=(1-i/r.trail.length)*.55;
      fwX.beginPath(); fwX.arc(t.x,t.y,1.1,0,6.28);
      fwX.fillStyle=r.color; fwX.fill(); fwX.restore();
    });
    fwX.save(); fwX.globalAlpha=.9; fwX.fillStyle=r.color;
    fwX.beginPath(); fwX.arc(r.x,r.y,2.2,0,6.28); fwX.fill(); fwX.restore();
    if(r.y<=r.targetY){ explodeFw(r.x,r.y,r.color); return false; }
    return true;
  });
  fwParts = fwParts.filter(p=>{
    p.x+=p.vx; p.y+=p.vy; p.vy+=.058; p.vx*=.982; p.alpha-=p.decay;
    if(p.alpha<=0) return false;
    fwX.save(); fwX.globalAlpha=p.alpha*.78; fwX.fillStyle=p.color;
    fwX.beginPath(); fwX.arc(p.x,p.y,p.r,0,6.28); fwX.fill(); fwX.restore();
    return true;
  });
  requestAnimationFrame(loopFw);
})();


/* ════════════════════════════════════════
   BUILD SCENES
════════════════════════════════════════ */
const reunionEl = document.getElementById('s-reunion');
CFG.team.forEach((p,i)=>{
  const d = document.createElement('div');
  d.className='scene'; d.id=`s-p${i}`;
  const isShort = p.message.length < 150;
  d.innerHTML=`<div class="pname">${p.name}</div><div class="prole">${p.role}</div><div class="pline"></div><div class="pmsg ${isShort?'short':''}">"${p.message}"</div>`;
  document.body.insertBefore(d, reunionEl);
});

document.getElementById('rgrid').innerHTML = CFG.team.map(p=>
  `<span class="rname">${p.name}</span>`).join('');
document.getElementById('rsub').textContent = CFG.reunionPhrase;
document.getElementById('f-name').textContent = CFG.bossName;
document.getElementById('f-msg').textContent = CFG.finalMessage;


/* ════════════════════════════════════════
   SCENE SEQUENCER
════════════════════════════════════════ */
const SCENES = ['s-intro', ...CFG.team.map((_,i)=>`s-p${i}`), 's-reunion', 's-final'];
let cur=-1, isPaused=false, autoTimer=null;

function showScene(i){
  if(i<0 || i>=SCENES.length) return;
  if(cur>=0) {
    const prev=document.getElementById(SCENES[cur]);
    prev.classList.remove('on','go');
  }
  cur=i;
  const sc=document.getElementById(SCENES[i]);
  sc.classList.add('on');
  setTimeout(()=>sc.classList.add('go'), 80);

  if(SCENES[i]==='s-reunion'){
    document.querySelectorAll('.rname').forEach((el,j)=>{
      setTimeout(()=>el.classList.add('lit'), 500+j*340);
    });
    setTimeout(()=>document.getElementById('rsub').classList.add('lit'), 500+CFG.team.length*340+600);
  }

  if(SCENES[i]==='s-final'){
    setTimeout(doBurst, 1100);
    if(fwTimer) clearInterval(fwTimer);
    fwTimer = setInterval(launchRocket, 1000);
    setTimeout(launchRocket, 100);
    setTimeout(launchRocket, 600);
  }

  document.getElementById('prog').style.width=(i/(SCENES.length-1)*100)+'%';
  updateNavButtons();
}

function nextScene(){ if(cur<SCENES.length-1) showScene(cur+1); }
function prevScene(){ if(cur>0) showScene(cur-1); }

function togglePause(){
  const player = document.getElementById('yt-player');
  if(!player) return;
  
  isPaused = !isPaused;
  document.getElementById('icon-pause').style.display = isPaused ? 'none' : 'block';
  document.getElementById('icon-play').style.display = isPaused ? 'block' : 'none';
  
  // Contrôler la vidéo YouTube
  const command = isPaused ? 'pauseVideo' : 'playVideo';
  player.contentWindow.postMessage(JSON.stringify({
    event: 'command',
    func: command,
    args: ''
  }), '*');
}

function updateNavButtons(){
  document.getElementById('btn-prev').style.opacity = cur<=0 ? '0.3' : '1';
  document.getElementById('btn-next').style.opacity = cur>=SCENES.length-1 ? '0.3' : '1';
}

function type(txt,el,done){
  let j=0; el.textContent='';
  const iv=setInterval(()=>{ el.textContent+=txt[j++]; if(j>=txt.length){clearInterval(iv);done&&done();} },55);
}


/* ════════════════════════════════════════
   START (click)
════════════════════════════════════════ */
function begin(){
  document.getElementById('start').classList.add('hide');

  // Lancer la musique YouTube après interaction utilisateur
  const ytWrap = document.getElementById('yt-wrap');
  ytWrap.innerHTML = `<iframe id="yt-player" width="1" height="1" src="https://www.youtube.com/embed/${CFG.youtubeId}?enablejsapi=1&autoplay=1&controls=0&loop=1&playlist=${CFG.youtubeId}&rel=0&iv_load_policy=3&modestbranding=1" title="CHANSON - JOYEUX ANNIVERSAIRE" frameborder="0" allow="autoplay" referrerpolicy="strict-origin-when-cross-origin"></iframe>`;

  // Ambient fireworks
  fwTimer = setInterval(launchRocket, 3200);
  setTimeout(launchRocket, 400);

  setTimeout(()=>{
    document.getElementById('start').style.display='none';
    document.getElementById('nav-controls').classList.add('visible');
    showScene(0);
    setTimeout(()=>type('Ce soir… quelques mots pour vous.', document.getElementById('intro-txt')), 500);
  }, 1100);
}


/* ════════════════════════════════════════
   SPARKLE BURST (final reveal)
════════════════════════════════════════ */
const bc=document.getElementById('burst'), bx=bc.getContext('2d');
function rzB(){ bc.width=innerWidth; bc.height=innerHeight; }
addEventListener('resize', rzB); rzB();
let sparks=[];

function doBurst(){
  const cx=innerWidth/2, cy=innerHeight*.3;
  for(let k=0;k<180;k++){
    const a=Math.random()*Math.PI*2, s=1+Math.random()*8;
    sparks.push({x:cx,y:cy,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2.5,alpha:1,r:.8+Math.random()*3,color:FW_COLS[0|Math.random()*FW_COLS.length]});
  }
  animBurst();
}
function animBurst(){
  bx.clearRect(0,0,bc.width,bc.height);
  sparks.forEach(s=>{s.x+=s.vx;s.y+=s.vy;s.vy+=.075;s.alpha-=.01;});
  sparks=sparks.filter(s=>s.alpha>0);
  sparks.forEach(s=>{bx.globalAlpha=s.alpha;bx.fillStyle=s.color;bx.beginPath();bx.arc(s.x,s.y,s.r,0,6.28);bx.fill();});
  if(sparks.length) requestAnimationFrame(animBurst);
}
</script>
</body>
</html>
